<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body { margin: 0; padding: 0; width: 1200px; height: 630px; display: flex; align-items: center; justify-content: center; background: #0e0e12; font-family: -apple-system, sans-serif; }
.card { text-align: center; }
.logo { font-size: 72px; font-weight: 800; letter-spacing: 12px; margin-bottom: 24px; }
.a { color: #E8685A; }
.h { color: #6bcb77; }
.i { color: #5B9BD5; }
.tagline { font-size: 28px; color: #f5f5f5; font-weight: 700; margin-bottom: 16px; }
.sub { font-size: 16px; color: #E8B84A; letter-spacing: 4px; text-transform: uppercase; }
</style>
</head>
<body>
<div class="card">
  <div class="logo"><span class="a">A</span><span class="h">H</span><span class="i">I</span></div>
  <div class="tagline">本質的な課題だけを、解決する。</div>
  <div class="sub">Where Human Wisdom Meets AI Power</div>
</div>
</body>
</html>
