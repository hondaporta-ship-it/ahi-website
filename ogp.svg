<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0e0e12"/>
  <!-- Subtle gradient -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:rgba(232,184,74,0.06)"/>
      <stop offset="100%" style="stop-color:rgba(0,0,0,0)"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <!-- Unicorn icon -->
  <g transform="translate(560,120) scale(2.5)">
    <path d="M22 44 Q15 38 16 30 Q17 22 24 18 L28 18 Q36 16 40 20 Q44 24 42 32 Q40 40 32 44 Q28 46 22 44Z" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M24 18 L28 8 L30 20" fill="none" stroke="#E8B84A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="34" cy="28" r="2.2" fill="white" opacity="0.9"/>
    <circle cx="26" cy="10" r="1.8" fill="#e8b84a" opacity="0.9"/>
    <circle cx="23" cy="14" r="1" fill="#e8b84a" opacity="0.5"/>
  </g>
  <!-- AHI text -->
  <text x="600" y="380" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="72" font-weight="800" letter-spacing="12">
    <tspan fill="#E8685A">A</tspan><tspan fill="#6bcb77">H</tspan><tspan fill="#5B9BD5">I</tspan>
  </text>
  <!-- Tagline -->
  <text x="600" y="440" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="28" fill="#f5f5f5" font-weight="700">本質的な課題だけを、解決する。</text>
  <!-- Sub -->
  <text x="600" y="490" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="16" fill="#E8B84A" letter-spacing="4" text-transform="uppercase">WHERE HUMAN WISDOM MEETS AI POWER</text>
  <!-- Bottom line -->
  <rect x="540" y="530" width="120" height="1.5" fill="rgba(232,184,74,0.3)"/>
</svg>
