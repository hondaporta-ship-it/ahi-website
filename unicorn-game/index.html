<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🦄 AHI Unicorn Run</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0e0e12; overflow: hidden; font-family: 'Helvetica Neue', sans-serif; }
canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const C = document.getElementById('c');
const X = C.getContext('2d');
let W, H, GY;

function resize() {
  W = C.width = window.innerWidth;
  H = C.height = window.innerHeight;
  GY = H - 80;
}
resize();
window.addEventListener('resize', resize);

// State
let mode = 'title'; // title | play | dead
let score = 0, best = +(localStorage.getItem('ahi-best') || 0);
let frame = 0, spd = 5;

// Player
let py, pvy;
function resetPlayer() { py = GY - 50; pvy = 0; }
resetPlayer();

// Obstacles
let obs = [];
// Particles
let pts = [];
// Stars
let stars = Array.from({length: 50}, () => ({
  x: Math.random() * 2000,
  y: Math.random() * 500,
  s: Math.random() * 2 + 0.5,
  t: Math.random() * 6
}));

function doJump() {
  if (mode === 'title') {
    mode = 'play'; score = 0; frame = 0; spd = 5;
    obs = []; pts = []; resetPlayer();
    return;
  }
  if (mode === 'dead') {
    mode = 'play'; score = 0; frame = 0; spd = 5;
    obs = []; pts = []; resetPlayer();
    return;
  }
  if (mode === 'play' && py >= GY - 52) {
    pvy = -13;
    for (let i = 0; i < 5; i++) pts.push({
      x: 80, y: py + 48, vx: -Math.random()*3, vy: -Math.random()*2,
      l: 1, c: '#E8B84A', r: Math.random()*3+1
    });
  }
}

// Input - multiple methods to ensure it works
document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); doJump(); }
});
document.addEventListener('pointerdown', e => { e.preventDefault(); doJump(); });

// Draw unicorn at (x, y)
function drawUni(x, y) {
  X.save();
  X.translate(x + 24, y + 24);
  const s = 0.8;
  // Body
  X.strokeStyle = 'rgba(255,255,255,0.85)';
  X.lineWidth = 2;
  X.lineCap = 'round';
  X.lineJoin = 'round';
  X.beginPath();
  X.moveTo(-8*s, 14*s);
  X.quadraticCurveTo(-15*s, 8*s, -14*s, 0);
  X.quadraticCurveTo(-13*s, -8*s, -6*s, -12*s);
  X.lineTo(-2*s, -12*s);
  X.quadraticCurveTo(6*s, -14*s, 10*s, -10*s);
  X.quadraticCurveTo(14*s, -6*s, 12*s, 2*s);
  X.quadraticCurveTo(10*s, 10*s, 2*s, 14*s);
  X.quadraticCurveTo(-2*s, 16*s, -8*s, 14*s);
  X.stroke();
  // Horn
  X.strokeStyle = '#E8B84A';
  X.lineWidth = 2.5;
  X.beginPath();
  X.moveTo(-6*s, -12*s);
  X.lineTo(-2*s, -22*s);
  X.lineTo(0, -10*s);
  X.stroke();
  // Eye
  X.fillStyle = '#fff';
  X.beginPath();
  X.arc(4*s, -2*s, 2*s, 0, Math.PI*2);
  X.fill();
  // Horn sparkle
  X.fillStyle = '#E8B84A';
  X.beginPath();
  X.arc(-4*s, -20*s, 1.5*s, 0, Math.PI*2);
  X.fill();
  // Legs
  if (mode === 'play') {
    const lg = Math.sin(frame * 0.2) * 4;
    X.strokeStyle = 'rgba(255,255,255,0.5)';
    X.lineWidth = 1.5;
    X.beginPath(); X.moveTo(-4*s, 14*s); X.lineTo((-6+lg)*s, 22*s); X.stroke();
    X.beginPath(); X.moveTo(4*s, 14*s); X.lineTo((2-lg)*s, 22*s); X.stroke();
  }
  X.restore();
}

function loop() {
  X.clearRect(0, 0, W, H);
  GY = H - 80;

  // Sky
  X.fillStyle = '#0e0e12';
  X.fillRect(0, 0, W, H);

  // Stars
  stars.forEach(st => {
    st.t += 0.02;
    X.globalAlpha = 0.3 + Math.sin(st.t) * 0.25;
    X.fillStyle = '#fff';
    X.beginPath(); X.arc(st.x % W, st.y, st.s, 0, Math.PI*2); X.fill();
    if (mode === 'play') st.x -= spd * 0.15;
  });
  X.globalAlpha = 1;

  // Ground
  X.fillStyle = '#1a1a24';
  X.fillRect(0, GY, W, H - GY);
  X.strokeStyle = 'rgba(232,184,74,0.25)';
  X.lineWidth = 1;
  X.beginPath(); X.moveTo(0, GY); X.lineTo(W, GY); X.stroke();

  if (mode === 'play') {
    frame++;
    spd = 5 + frame * 0.003;

    // Gravity
    pvy += 0.65;
    py += pvy;
    if (py >= GY - 50) { py = GY - 50; pvy = 0; }

    // Spawn
    if (frame % Math.max(40, Math.floor(100 - frame * 0.04)) === 0) {
      const h = 30 + Math.random() * 35;
      obs.push({ x: W + 20, h, w: 20 + Math.random() * 15, scored: false });
    }

    // Update obstacles
    for (let i = obs.length - 1; i >= 0; i--) {
      const o = obs[i];
      o.x -= spd;
      if (o.x < -60) { obs.splice(i, 1); continue; }
      // Score
      if (!o.scored && o.x + o.w < 80) {
        o.scored = true;
        score++;
      }
      // Collision
      const pad = 8;
      if (80 + pad < o.x + o.w && 80 + 48 - pad > o.x &&
          py + pad < GY - 0 && py + 48 - pad > GY - o.h) {
        // Hit!
        mode = 'dead';
        if (score > best) { best = score; localStorage.setItem('ahi-best', best); }
        for (let j = 0; j < 15; j++) pts.push({
          x: 104, y: py + 24, vx: (Math.random()-0.5)*8, vy: (Math.random()-0.5)*8,
          l: 1, c: ['#ff6b6b','#E8B84A','#4d96ff','#6bcb77'][j%4], r: Math.random()*4+2
        });
      }
    }

    // Trail
    if (frame % 5 === 0 && py >= GY - 52) {
      pts.push({ x: 80, y: py+46, vx: -Math.random()*2, vy: -Math.random(), l: 0.5, c: '#E8B84A', r: Math.random()*2+1 });
    }
  }

  // Draw obstacles
  obs.forEach(o => {
    const oy = GY - o.h;
    X.fillStyle = '#cc3333';
    X.fillRect(o.x, oy, o.w, o.h);
    X.fillStyle = 'rgba(255,255,255,0.12)';
    X.fillRect(o.x, oy, o.w, 3);
  });

  // Draw player
  const bobble = mode === 'title' ? Math.sin(Date.now() * 0.003) * 5 : 0;
  drawUni(80, (mode === 'play' || mode === 'dead') ? py : GY - 50 + bobble);

  // Particles
  for (let i = pts.length - 1; i >= 0; i--) {
    const p = pts[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.l -= 0.02;
    if (p.l <= 0) { pts.splice(i, 1); continue; }
    X.globalAlpha = p.l;
    X.fillStyle = p.c;
    X.beginPath(); X.arc(p.x, p.y, p.r * p.l, 0, Math.PI*2); X.fill();
  }
  X.globalAlpha = 1;

  // Score display
  if (mode === 'play') {
    X.fillStyle = '#E8B84A';
    X.font = 'bold 32px Helvetica Neue, sans-serif';
    X.textAlign = 'right';
    X.fillText(score, W - 24, 48);
  }

  // Title screen
  if (mode === 'title') {
    X.fillStyle = '#E8B84A';
    X.font = 'bold 42px Helvetica Neue, sans-serif';
    X.textAlign = 'center';
    X.fillText('🦄 AHI Unicorn Run', W/2, H/2 - 60);
    X.fillStyle = '#888';
    X.font = '16px Helvetica Neue, sans-serif';
    X.fillText('タップ or スペースでスタート', W/2, H/2 - 20);
    X.fillStyle = '#555';
    X.font = '13px Helvetica Neue, sans-serif';
    X.fillText('Best: ' + best, W/2, H/2 + 20);
  }

  // Game over
  if (mode === 'dead') {
    X.fillStyle = 'rgba(0,0,0,0.5)';
    X.fillRect(0, 0, W, H);
    X.fillStyle = '#ff6b6b';
    X.font = 'bold 38px Helvetica Neue, sans-serif';
    X.textAlign = 'center';
    X.fillText('GAME OVER', W/2, H/2 - 50);
    X.fillStyle = '#E8B84A';
    X.font = 'bold 28px Helvetica Neue, sans-serif';
    X.fillText('Score: ' + score, W/2, H/2);
    X.fillStyle = '#666';
    X.font = '15px Helvetica Neue, sans-serif';
    X.fillText('Best: ' + best, W/2, H/2 + 35);
    X.fillStyle = '#888';
    X.font = '14px Helvetica Neue, sans-serif';
    X.fillText('タップ or スペースでリトライ', W/2, H/2 + 70);
  }

  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
